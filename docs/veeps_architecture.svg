<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#F7F9FC" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="17" font-weight="bold" fill="#1A2E4A">Kiến trúc luồng dữ liệu thời gian thực — VEEPS</text>

  <!-- ZONE: Windows -->
  <rect x="30" y="58" width="215" height="350" rx="10" fill="#EAF2FF" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="137" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C6FAC">Môi trường Windows</text>

  <!-- ZONE: MQTT Broker -->
  <rect x="338" y="58" width="215" height="350" rx="10" fill="#FFF8EC" stroke="#E8A320" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="445" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#B07A10">MQTT Broker</text>

  <!-- ZONE: Linux/Docker -->
  <rect x="646" y="58" width="224" height="350" rx="10" fill="#EAFAF1" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="758" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E8449">Linux / Docker RSU</text>

  <!-- BLOCK 1: SUMO CSV -->
  <rect x="48" y="100" width="178" height="68" rx="8" fill="#2C6FAC" stroke="#1A4A80" stroke-width="1.5"/>
  <text x="137" y="124" text-anchor="middle" font-size="13" font-weight="bold" fill="white">SUMO CSV Files</text>
  <text x="137" y="142" text-anchor="middle" font-size="10.5" fill="#CCE0FF">dataset_kb1.csv ... kb4.csv</text>
  <text x="137" y="158" text-anchor="middle" font-size="10" fill="#CCE0FF">~14.1 GB tổng cộng</text>

  <!-- Arrow down -->
  <line x1="137" y1="168" x2="137" y2="196" stroke="#2C6FAC" stroke-width="2" marker-end="url(#ab)"/>

  <!-- BLOCK 2: MQTT Producer -->
  <rect x="48" y="196" width="178" height="80" rx="8" fill="#4A90D9" stroke="#2C6FAC" stroke-width="1.5"/>
  <text x="137" y="221" text-anchor="middle" font-size="13" font-weight="bold" fill="white">MQTT Producer</text>
  <text x="137" y="239" text-anchor="middle" font-size="10.5" fill="#E0F0FF">Đọc CSV từng dòng</text>
  <text x="137" y="254" text-anchor="middle" font-size="10.5" fill="#E0F0FF">Publish mỗi giây</text>
  <text x="137" y="268" text-anchor="middle" font-size="10" fill="#FFE08A">producer.py (Python)</text>

  <!-- Arrow right: Producer → Broker -->
  <line x1="226" y1="236" x2="336" y2="236" stroke="#E8A320" stroke-width="2.5" marker-end="url(#ao)"/>
  <text x="281" y="228" text-anchor="middle" font-size="10" fill="#B07A10">publish</text>
  <text x="281" y="242" text-anchor="middle" font-size="10" fill="#B07A10">topic: v2x/data</text>

  <!-- BLOCK 3: Mosquitto -->
  <rect x="356" y="178" width="178" height="116" rx="8" fill="#E8A320" stroke="#B07A10" stroke-width="1.5"/>
  <text x="445" y="207" text-anchor="middle" font-size="13" font-weight="bold" fill="white">&#x1F4E1; Eclipse Mosquitto</text>
  <text x="445" y="228" text-anchor="middle" font-size="10.5" fill="#FFF5DC">Port: 1883</text>
  <text x="445" y="245" text-anchor="middle" font-size="10.5" fill="#FFF5DC">allow_anonymous: true</text>
  <text x="445" y="262" text-anchor="middle" font-size="10.5" fill="#FFF5DC">Nhận &amp; chuyển tiếp</text>
  <text x="445" y="279" text-anchor="middle" font-size="10.5" fill="#FFF5DC">MQTT message</text>

  <!-- Arrow right: Broker → RSU -->
  <line x1="534" y1="236" x2="644" y2="236" stroke="#27AE60" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="589" y="228" text-anchor="middle" font-size="10" fill="#1E8449">subscribe</text>
  <text x="589" y="242" text-anchor="middle" font-size="10" fill="#1E8449">topic: v2x/data</text>

  <!-- DOCKER CONTAINER inner blocks -->
  <!-- edge_processor -->
  <rect x="662" y="90" width="192" height="52" rx="6" fill="#27AE60" stroke="#1E8449" stroke-width="1.5"/>
  <text x="758" y="112" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">edge_processor.py</text>
  <text x="758" y="130" text-anchor="middle" font-size="10" fill="#D5F5E3">Subscribe MQTT · Nhận dữ liệu xe</text>

  <line x1="758" y1="142" x2="758" y2="158" stroke="#1E8449" stroke-width="1.8" marker-end="url(#ag2)"/>

  <!-- Sliding Window -->
  <rect x="662" y="158" width="192" height="52" rx="6" fill="#1E8449" stroke="#145A32" stroke-width="1.5"/>
  <text x="758" y="179" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">Sliding Window</text>
  <text x="758" y="197" text-anchor="middle" font-size="10" fill="#D5F5E3">deque(maxlen=300) · Tích lũy 5 phút</text>

  <line x1="758" y1="210" x2="758" y2="226" stroke="#1E8449" stroke-width="1.8" marker-end="url(#ag2)"/>

  <!-- Feature Extraction -->
  <rect x="662" y="226" width="192" height="52" rx="6" fill="#117A65" stroke="#0E6655" stroke-width="1.5"/>
  <text x="758" y="247" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">Feature Extraction</text>
  <text x="758" y="265" text-anchor="middle" font-size="10" fill="#D5F5E3">FDR_med · FDR_out · FDR_in · FDR_std</text>

  <line x1="758" y1="278" x2="758" y2="294" stroke="#1E8449" stroke-width="1.8" marker-end="url(#ag2)"/>

  <!-- XGBoost Inference -->
  <rect x="662" y="294" width="192" height="68" rx="6" fill="#0E6655" stroke="#0A4F44" stroke-width="1.5"/>
  <text x="758" y="316" text-anchor="middle" font-size="11.5" font-weight="bold" fill="white">XGBoost Inference</text>
  <text x="758" y="333" text-anchor="middle" font-size="10" fill="#D5F5E3">veeps_spatio_temporal.json</text>
  <text x="758" y="350" text-anchor="middle" font-size="10.5" fill="#FFE08A">→ Dự báo SPI (t + 15 phút)</text>

  <!-- OSM block -->
  <rect x="48" y="318" width="178" height="58" rx="8" fill="#7F8C8D" stroke="#566573" stroke-width="1.5"/>
  <text x="137" y="342" text-anchor="middle" font-size="12" font-weight="bold" fill="white">&#x1F5FA; osm.net.xml</text>
  <text x="137" y="359" text-anchor="middle" font-size="10" fill="#ECF0F1">Ma trận kề mạng đường bộ</text>
  <text x="137" y="373" text-anchor="middle" font-size="10" fill="#ECF0F1">Budapest Quận XI</text>

  <!-- OSM → Feature Extraction (volume mount, dashed) -->
  <path d="M 226 347 Q 500 430 661 270" fill="none" stroke="#7F8C8D" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#agray)"/>
  <text x="430" y="450" text-anchor="middle" font-size="10" fill="#566573">Docker Volume mount</text>

  <!-- OUTPUT block -->
  <rect x="340" y="390" width="210" height="50" rx="8" fill="#1A2E4A" stroke="#0D1B2A" stroke-width="1.5"/>
  <text x="445" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="white">&#x1F4CA; Cảnh báo đầu ra</text>
  <text x="445" y="430" text-anchor="middle" font-size="11" fill="#FFE08A">CONGESTED  /  FREE FLOW</text>

  <!-- XGBoost → Output -->
  <path d="M 758 362 Q 758 415 552 415" fill="none" stroke="#1A2E4A" stroke-width="2" marker-end="url(#adark)"/>

  <!-- LEGEND -->
  <rect x="30" y="467" width="840" height="40" rx="6" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
  <line x1="52" y1="487" x2="85" y2="487" stroke="#E8A320" stroke-width="2.5"/>
  <text x="92" y="491" font-size="10.5" fill="#333">Luồng MQTT</text>
  <line x1="210" y1="487" x2="243" y2="487" stroke="#1E8449" stroke-width="2.5"/>
  <text x="250" y="491" font-size="10.5" fill="#333">Xử lý nội bộ RSU</text>
  <line x1="400" y1="487" x2="433" y2="487" stroke="#7F8C8D" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="440" y="491" font-size="10.5" fill="#333">Docker Volume</text>
  <line x1="580" y1="487" x2="613" y2="487" stroke="#1A2E4A" stroke-width="2"/>
  <text x="620" y="491" font-size="10.5" fill="#333">Kết quả dự báo</text>

  <!-- ARROW MARKERS -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2C6FAC"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E8A320"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#27AE60"/>
    </marker>
    <marker id="ag2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#1E8449"/>
    </marker>
    <marker id="agray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7F8C8D"/>
    </marker>
    <marker id="adark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1A2E4A"/>
    </marker>
  </defs>
</svg>
